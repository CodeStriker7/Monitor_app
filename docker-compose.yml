services:
  monitor-app:
    build: .
    container_name: system_monitor
    ports:
      - "8000:80"
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus_db
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # Prometheus ma'lumotlari ham o'chib ketmasligi uchun:
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana_viz
    volumes:
      # GRAFANA MA'LUMOTLARINI SAQLASH:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

# Doimiy xotira (volumes) qismini e'lon qilamiz
volumes:
  prometheus_data:
  grafana_data: